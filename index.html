<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>桌球对局 · skill-pool v4 (final)</title>
<link rel="stylesheet" href="./style_final.css?v=20240629c" />
</head>
<body>

<!-- 9:16 舞台容器 -->
<div class="stage-frame">
<div class="stage" id="stage">

  <!-- 顶部 HUD -->
  <header class="hud">
    <div class="hud-rows">
      <div class="hud-row">
        <span class="hud-label" id="hud-opp-label">对手的</span>
        <ul class="hud-balls" id="rack-opp">
          <li class="slot" data-slot="0"></li><li class="slot" data-slot="1"></li>
          <li class="slot" data-slot="2"></li><li class="slot" data-slot="3"></li>
          <li class="slot" data-slot="4"></li><li class="slot" data-slot="5"></li>
          <li class="slot" data-slot="6"></li>
        </ul>
      </div>
      <div class="hud-row">
        <span class="hud-label">你的球</span>
        <ul class="hud-balls" id="rack-me">
          <li class="slot" data-slot="0"></li><li class="slot" data-slot="1"></li>
          <li class="slot" data-slot="2"></li><li class="slot" data-slot="3"></li>
          <li class="slot" data-slot="4"></li><li class="slot" data-slot="5"></li>
          <li class="slot" data-slot="6"></li>
        </ul>
      </div>
    </div>
  </header>

  <div class="turn-strip">
    <span class="turn-pill" id="turn-pill">你的回合</span>
  </div>

  <!-- 玩法引导：常驻问号按钮（左上角） -->
  <button class="help-btn" id="btn-help" aria-label="玩法说明">?</button>

  <!-- 玩法引导：分步高亮浮层 -->
  <div class="guide-mask" id="guide-mask" hidden>
    <div class="guide-hole" id="guide-hole"></div>
    <div class="guide-tip" id="guide-tip">
      <div class="guide-step" id="guide-step">1 / 4</div>
      <div class="guide-text" id="guide-text"></div>
      <div class="guide-btns">
        <button class="guide-skip" id="guide-skip">跳过</button>
        <button class="guide-next" id="guide-next">下一步</button>
      </div>
    </div>
  </div>

  <!-- 小麦圆形头像框 + 气泡（右上角浮层） -->
  <div class="char-stage" id="char-stage">
    <div class="char-bubble" id="char-bubble"></div>
    <div class="char-frame mood-happy" id="char-frame"></div>
  </div>

  <main class="play-area">
    <div id="toast-layer"></div>

    <aside class="cue-rail" id="cue-rail">
      <div class="rail-track">
        <div class="rail-fill" id="rail-fill"></div>
      </div>
      <div class="rail-stick" id="rail-stick">
        <div class="rail-stick-tip"></div>
        <div class="rail-stick-body"></div>
        <div class="rail-stick-grip"></div>
      </div>
    </aside>

      <div class="table-wrap">
      <div class="table" id="table">
        <div class="felt">
          <div class="pocket pocket-tl"></div>
          <div class="pocket pocket-tr"></div>
          <div class="pocket pocket-ml"></div>
          <div class="pocket pocket-mr"></div>
          <div class="pocket pocket-bl"></div>
          <div class="pocket pocket-br"></div>

          <div class="cushion cushion-top"></div>
          <div class="cushion cushion-bottom"></div>
          <div class="cushion cushion-left"></div>
          <div class="cushion cushion-right"></div>

          <canvas id="table-canvas" width="400" height="800"></canvas>

          <svg class="aim-layer" id="aim-layer" viewBox="0 0 400 800" preserveAspectRatio="none">
            <line id="aim-line" x1="0" y1="0" x2="0" y2="0"
                  stroke="rgba(255,255,255,0.95)" stroke-width="2" opacity="0"/>
            <g id="aim-bracket" opacity="0">
              <path d="M -18 -18 L -10 -18 L -10 -10" stroke="#fff" stroke-width="2" fill="none"/>
              <path d="M 18 -18 L 10 -18 L 10 -10"   stroke="#fff" stroke-width="2" fill="none"/>
              <path d="M -18 18 L -10 18 L -10 10"   stroke="#fff" stroke-width="2" fill="none"/>
              <path d="M 18 18 L 10 18 L 10 10"     stroke="#fff" stroke-width="2" fill="none"/>
            </g>
            <line id="cue-after-line" x1="0" y1="0" x2="0" y2="0"
                  stroke="rgba(255,255,255,0.55)" stroke-width="1.5"
                  stroke-dasharray="4 4" opacity="0"/>
            <line id="target-line" x1="0" y1="0" x2="0" y2="0"
                  stroke="rgba(255,255,255,0.7)" stroke-width="1.5"
                  stroke-dasharray="4 4" opacity="0"/>
            <line id="bounce-line" x1="0" y1="0" x2="0" y2="0"
                  stroke="rgba(120,200,255,0.5)" stroke-width="1.5"
                  stroke-dasharray="5 5" opacity="0"/>
            <circle id="ghost-ball" cx="0" cy="0" r="14"
                  fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.65)"
                  stroke-width="1.4" stroke-dasharray="3 3" opacity="0"/>
            <g id="table-cue" opacity="0">
              <line id="table-cue-stick" x1="0" y1="0" x2="0" y2="0"
                    stroke="url(#cueGrad)" stroke-width="6" stroke-linecap="round"/>
              <line id="table-cue-tip" x1="0" y1="0" x2="0" y2="0"
                    stroke="#3a4a6a" stroke-width="6" stroke-linecap="round"/>
            </g>
            <defs>
              <linearGradient id="cueGrad" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0" stop-color="#2a2018"/>
                <stop offset="0.15" stop-color="#7a4a28"/>
                <stop offset="1" stop-color="#d89a5a"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
      </div>
    </div>

  </main>

  <!-- 游戏结束弹窗（可爱风：奖牌横幅 + 拍立得立绘 + 点评） -->
  <div class="game-over-mask" id="game-over-mask">
    <div class="game-over-card" id="game-over-card">
      <!-- 顶部横幅奖牌 -->
      <div class="go-banner" id="go-banner"><span id="go-banner-text">胜利</span></div>
      <!-- 拍立得照片：图钉 + 小麦立绘 -->
      <div class="go-photo" id="go-photo">
        <span class="go-pin"></span>
        <div class="go-photo-inner">
          <img class="go-avatar" id="go-avatar" src="./assets/xiaomai-pout.png" alt="小麦" />
        </div>
      </div>
      <!-- 主标题（是胜利啊！/ 不小心失败啦..） -->
      <div class="go-title" id="game-over-title"></div>
      <!-- 小麦点评 -->
      <div class="go-comment" id="game-over-reason"></div>
      <!-- 按钮 -->
      <button class="btn-game-restart" id="btn-game-restart">再 来 一 次</button>
    </div>
  </div>

</div><!-- /.stage -->
</div><!-- /.stage-frame -->

<script src="./matter.min.js"></script>
<script src="./game_final.js?v=20240701b"></script>
</body>
</html>
